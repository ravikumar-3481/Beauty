<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegance Studio - Image Uploader</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        brand: {
                            50: '#fdf2f8',
                            100: '#fce7f3',
                            200: '#fbcfe8',
                            300: '#f9a8d4',
                            400: '#f472b6',
                            500: '#ec4899',
                            600: '#db2777',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(219, 39, 119, 0.15);
        }

        .upload-area {
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.4);
        }
        
        .upload-area:hover, .upload-area.dragover {
            background: rgba(253, 242, 248, 0.8);
            border-color: #ec4899;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #f9a8d4; border-radius: 10px; }

        /* Loader Animation */
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Animation */
        .toast {
            transform: translateY(100%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="text-gray-800 antialiased selection:bg-brand-200 selection:text-brand-900">

    <!-- Toast Notification (Bottom Center) -->
    <div id="toast" class="toast fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex items-center gap-3 px-6 py-4 rounded-2xl shadow-xl glass-card max-w-sm w-[90%] pointer-events-none">
        <i id="toastIcon" class="ph text-2xl"></i>
        <div class="flex-1">
            <h4 id="toastTitle" class="font-semibold text-sm">Notification</h4>
            <p id="toastMessage" class="text-xs text-gray-500 mt-0.5">Message goes here</p>
        </div>
    </div>

    <!-- Main Container -->
    <div class="w-full max-w-md relative">
        
        <!-- Decorative blobs behind the card -->
        <div class="absolute -top-12 -left-12 w-40 h-40 bg-brand-300 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-pulse"></div>
        <div class="absolute -bottom-12 -right-12 w-40 h-40 bg-purple-300 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-pulse" style="animation-delay: 1s;"></div>

        <!-- Glassmorphism Card -->
        <div class="glass-card rounded-[2rem] p-8 relative z-10 overflow-hidden">
            
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-white text-brand-500 shadow-sm border border-brand-50 mb-4 transform rotate-3 hover:rotate-0 transition-transform">
                    <i class="ph ph-camera-sparkle text-3xl"></i>
                </div>
                <h1 class="font-serif text-3xl font-bold text-gray-900">Work Gallery</h1>
                <p class="text-sm text-gray-500 mt-1">Upload new images to Google Sheets</p>
            </div>

            <!-- Form -->
            <form id="uploadForm" class="space-y-5">
                
                <!-- Service Input -->
                <div class="space-y-1.5">
                    <label for="serviceName" class="block text-sm font-medium text-gray-700 pl-1">
                        <i class="ph ph-sparkle mr-1 text-brand-400"></i> Service Done
                    </label>
                    <div class="relative">
                        <input type="text" id="serviceName" required 
                            class="w-full pl-4 pr-10 py-3 rounded-xl border border-white bg-white/50 focus:bg-white focus:ring-2 focus:ring-brand-300 focus:border-brand-300 outline-none transition-all placeholder-gray-400 shadow-sm"
                            placeholder="e.g. Bridal Makeup, Hair Spa">
                    </div>
                </div>

                <!-- Worker Input -->
                <div class="space-y-1.5">
                    <label for="workerName" class="block text-sm font-medium text-gray-700 pl-1">
                        <i class="ph ph-user mr-1 text-brand-400"></i> Stylist Name
                    </label>
                    <div class="relative">
                        <input type="text" id="workerName" required 
                            class="w-full pl-4 pr-10 py-3 rounded-xl border border-white bg-white/50 focus:bg-white focus:ring-2 focus:ring-brand-300 focus:border-brand-300 outline-none transition-all placeholder-gray-400 shadow-sm"
                            placeholder="Who performed the service?">
                    </div>
                </div>

                <!-- Image Upload Area -->
                <div class="space-y-1.5 pt-2">
                    <label class="block text-sm font-medium text-gray-700 pl-1">
                        <i class="ph ph-image mr-1 text-brand-400"></i> Photo
                    </label>
                    
                    <div class="relative group">
                        <input type="file" id="imageInput" accept="image/jpeg, image/png, image/webp" required class="hidden">
                        
                        <!-- Drag & Drop Zone -->
                        <label for="imageInput" id="dropZone" class="upload-area cursor-pointer flex flex-col items-center justify-center w-full h-48 border-2 border-dashed border-brand-200 rounded-2xl transition-all overflow-hidden relative group">
                            
                            <!-- Initial State -->
                            <div id="uploadPlaceholder" class="flex flex-col items-center justify-center text-gray-400 group-hover:text-brand-500 transition-colors z-10">
                                <div class="w-12 h-12 rounded-full bg-white shadow-sm flex items-center justify-center mb-3">
                                    <i class="ph ph-upload-simple text-xl"></i>
                                </div>
                                <span class="text-sm font-medium text-gray-600">Tap to browse photo</span>
                                <span class="text-xs text-gray-400 mt-1 px-4 text-center">Supports JPG, PNG (Max 5MB)</span>
                            </div>

                            <!-- Preview State -->
                            <img id="imagePreview" class="absolute inset-0 w-full h-full object-cover hidden z-0" alt="Work Preview">
                            
                            <!-- Overlay on Hover when image exists -->
                            <div id="changeOverlay" class="absolute inset-0 bg-gray-900/40 hidden flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity z-20">
                                <i class="ph ph-arrows-clockwise text-white text-2xl mb-1"></i>
                                <span class="text-white text-sm font-medium">Change Photo</span>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn" class="w-full bg-brand-500 hover:bg-brand-600 text-white font-medium py-3.5 rounded-xl shadow-lg shadow-brand-200 hover:shadow-brand-300 transform transition-all active:scale-[0.98] mt-6 flex items-center justify-center group overflow-hidden relative">
                    <span class="absolute w-0 h-0 transition-all duration-500 ease-out bg-white rounded-full group-hover:w-56 group-hover:h-56 opacity-10"></span>
                    <span id="btnText" class="relative flex items-center">
                        <i class="ph ph-cloud-arrow-up text-lg mr-2"></i> Upload to Sheets
                    </span>
                    <div id="btnLoader" class="hidden relative items-center">
                        <span class="spinner"></span> Syncing...
                    </div>
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-[10px] text-gray-400 uppercase tracking-widest">Internal System</p>
            </div>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // App Script URL yahan diya gaya hai
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxQEmidxLqF2nSiopZ_hTGmB-4gkqUXAhbYHdgSMZcg7PU9cyR62FkPbcKILx2sZ75QtQ/exec";

        const form = document.getElementById('uploadForm');
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const changeOverlay = document.getElementById('changeOverlay');
        const dropZone = document.getElementById('dropZone');
        
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');

        const toast = document.getElementById('toast');
        const toastIcon = document.getElementById('toastIcon');
        const toastTitle = document.getElementById('toastTitle');
        const toastMessage = document.getElementById('toastMessage');
        let toastTimeout;

        // --- Drag and Drop Handling ---
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length > 0) {
                imageInput.files = files; // Assign file to input
                handleFiles(files[0]);
            }
        }

        // --- Input File Handling ---
        imageInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                handleFiles(this.files[0]);
            }
        });

        function handleFiles(file) {
            // Validation
            if (!file.type.startsWith('image/')) {
                showToast("Invalid File", "Please select an image file (JPG, PNG).", "error");
                imageInput.value = ''; // Reset
                return;
            }
            
            // 5MB Limit Check
            if (file.size > 5 * 1024 * 1024) {
                showToast("File too large", "Please select an image smaller than 5MB.", "error");
                imageInput.value = ''; // Reset
                return;
            }

            // Preview
            const reader = new FileReader();
            reader.onload = function(e) {
                imagePreview.src = e.target.result;
                imagePreview.classList.remove('hidden');
                changeOverlay.classList.remove('hidden');
                changeOverlay.classList.add('flex');
                uploadPlaceholder.classList.add('hidden');
            }
            reader.readAsDataURL(file);
        }

        // --- Form Submit Handling ---
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const serviceName = document.getElementById('serviceName').value.trim();
            const workerName = document.getElementById('workerName').value.trim();
            const file = imageInput.files[0];

            if (!file) {
                showToast("Missing Image", "Please select a work photo to upload.", "error");
                return;
            }

            // Set Loading UI
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-80', 'cursor-not-allowed', 'bg-brand-400');
            submitBtn.classList.remove('hover:bg-brand-600', 'hover:shadow-brand-300');
            btnText.classList.add('hidden');
            btnLoader.classList.remove('hidden');
            btnLoader.classList.add('flex');

            try {
                // Convert to Base64
                const base64Image = await convertToBase64(file);

                // Create Payload
                const payload = {
                    serviceName: serviceName,
                    workerName: workerName,
                    imageBlob: base64Image
                };

                // Send to App Script
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.status === "success") {
                    showToast("Upload Successful!", "Image saved to Drive & Sheet updated.", "success");
                    resetForm();
                } else {
                    showToast("Upload Failed", result.message || "An error occurred.", "error");
                }
            } catch (error) {
                console.error("Upload error:", error);
                showToast("Connection Error", "Could not connect to the server. Try again.", "error");
            } finally {
                // Reset Button UI
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-80', 'cursor-not-allowed', 'bg-brand-400');
                submitBtn.classList.add('hover:bg-brand-600', 'hover:shadow-brand-300');
                btnText.classList.remove('hidden');
                btnLoader.classList.add('hidden');
                btnLoader.classList.remove('flex');
            }
        });

        // --- Helpers ---
        function convertToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function resetForm() {
            form.reset();
            imagePreview.src = '';
            imagePreview.classList.add('hidden');
            changeOverlay.classList.add('hidden');
            changeOverlay.classList.remove('flex');
            uploadPlaceholder.classList.remove('hidden');
        }

        function showToast(title, message, type) {
            clearTimeout(toastTimeout);
            
            toastTitle.innerText = title;
            toastMessage.innerText = message;
            
            // Reset classes
            toast.className = "toast fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex items-center gap-3 px-6 py-4 rounded-2xl shadow-xl glass-card max-w-sm w-[90%] pointer-events-none border-l-4";
            
            if (type === 'success') {
                toast.classList.add('border-green-500');
                toastIcon.className = "ph-fill ph-check-circle text-3xl text-green-500";
                toastTitle.classList.add('text-green-800');
            } else {
                toast.classList.add('border-red-500');
                toastIcon.className = "ph-fill ph-warning-circle text-3xl text-red-500";
                toastTitle.classList.add('text-red-800');
            }

            toast.classList.add('show');

            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }
    </script>
</body>
</html>
